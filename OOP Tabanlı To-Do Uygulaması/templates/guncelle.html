{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto">
        <div class="card shadow-sm">
            <div class="card-body">
                <h5 class="card-title">✏️ Görevi Düzenle</h5>
                <form action="{{ url_for('gorev_duzenle', gorev_id=gorev.id) }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Görev Başlığı</label>
                        <input type="text" class="form-control" name="baslik" 
                               value="{{ gorev.baslik }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Açıklama</label>
                        <textarea class="form-control" name="aciklama" 
                                  rows="3">{{ gorev.aciklama or '' }}</textarea>
                    </div>
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{{ url_for('index') }}" class="btn btn-secondary me-md-2">İptal</a>
                        <button type="submit" class="btn btn-primary">Güncelle</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
